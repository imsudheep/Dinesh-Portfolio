<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dinesh Kumar - Portfolio</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Google Fonts: Poppins -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
        }

        /* Custom scrollbar to keep it minimal */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        ::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #555;
        }

        .animate-fade-in-up {
            animation: fadeInUp 0.8s ease-out forwards;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translate3d(0, 40px, 0);
            }

            to {
                opacity: 1;
                transform: translate3d(0, 0, 0);
            }
        }

        /* Outline Text Support */
        .stroke-text {
            -webkit-text-stroke: 1px black;
            color: transparent;
        }

        .stroke-text-bold {
            -webkit-text-stroke: 2px black;
            color: transparent;
        }
    </style>
</head>

<body class="bg-white text-black selection:bg-black selection:text-white">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- Custom Hook for Counting Animation ---
        const useCounter = (end, duration = 2000) => {
            const [count, setCount] = useState(0);
            const countRef = useRef(null);
            const [isVisible, setIsVisible] = useState(false);

            useEffect(() => {
                const observer = new IntersectionObserver(
                    ([entry]) => {
                        if (entry.isIntersecting) {
                            setIsVisible(true);
                            observer.disconnect();
                        }
                    },
                    { threshold: 0.1 }
                );

                if (countRef.current) {
                    observer.observe(countRef.current);
                }

                return () => observer.disconnect();
            }, []);

            useEffect(() => {
                if (!isVisible) return;

                let startTime;
                let animationFrame;

                const step = (timestamp) => {
                    if (!startTime) startTime = timestamp;
                    const progress = Math.min((timestamp - startTime) / duration, 1);
                    setCount(Math.floor(progress * end));

                    if (progress < 1) {
                        animationFrame = requestAnimationFrame(step);
                    }
                };

                animationFrame = requestAnimationFrame(step);

                return () => cancelAnimationFrame(animationFrame);
            }, [end, duration, isVisible]);

            return { count, countRef };
        };

        // --- Icons Components ---
        const IconWrapper = ({ children, size = 24, className = "" }) => (
            <svg
                xmlns="http://www.w3.org/2000/svg"
                width={size}
                height={size}
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                strokeWidth="2"
                strokeLinecap="round"
                strokeLinejoin="round"
                className={className}
            >
                {children}
            </svg>
        );

        const MenuIcon = (props) => <IconWrapper {...props}><line x1="4" x2="20" y1="12" y2="12" /><line x1="4" x2="20" y1="6" y2="6" /><line x1="4" x2="20" y1="18" y2="18" /></IconWrapper>;
        const XIcon = (props) => <IconWrapper {...props}><path d="M18 6 6 18" /><path d="m6 6 12 12" /></IconWrapper>;
        const ArrowRight = (props) => <IconWrapper {...props}><path d="M5 12h14" /><path d="m12 5 7 7-7 7" /></IconWrapper>;
        const Download = (props) => <IconWrapper {...props}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" /><polyline points="7 10 12 15 17 10" /><line x1="12" x2="12" y1="15" y2="3" /></IconWrapper>;
        const CodeIcon = (props) => <IconWrapper {...props}><polyline points="16 18 22 12 16 6" /><polyline points="8 6 2 12 8 18" /></IconWrapper>;
        const PenTool = (props) => <IconWrapper {...props}><path d="m12 19 7-7 3 3-7 7-3-3z" /><path d="m18 13-1.5-7.5L2 2l3.5 14.5L13 18l5-5z" /><path d="m2 2 7.586 7.586" /><circle cx="11" cy="11" r="2" /></IconWrapper>;
        const Video = (props) => <IconWrapper {...props}><path d="m22 8-6 4 6 4V8Z" /><rect width="14" height="12" x="2" y="6" rx="2" ry="2" /></IconWrapper>;
        const ExternalLink = (props) => <IconWrapper {...props}><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" /><polyline points="15 3 21 3 21 9" /><line x1="10" x2="21" y1="14" y2="3" /></IconWrapper>;
        const Mail = (props) => <IconWrapper {...props}><rect width="20" height="16" x="2" y="4" rx="2" /><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7" /></IconWrapper>;
        const Smartphone = (props) => <IconWrapper {...props}><rect width="14" height="20" x="5" y="2" rx="2" ry="2" /><path d="M12 18h.01" /></IconWrapper>;
        const Linkedin = (props) => <IconWrapper {...props}><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z" /><rect width="4" height="12" x="2" y="9" /><circle cx="4" cy="4" r="2" /></IconWrapper>;
        const Github = (props) => <IconWrapper {...props}><path d="M15 22v-4a4.8 4.8 0 0 0-1-3.5c3 0 6-2 6-5.5.08-1.25-.27-2.48-1-3.5.28-1.15.28-2.35 0-3.5 0 0-1 0-3 1.5-2.64-.5-5.36.5-8 0C6.72-.28 1.45.28 1 3.5c-.27 1.15-.27 2.35 0 3.5-.72 1.02-1.08 2.25-1 3.5 0 3.5 3 5.5 6 5.5-.39.49-.68 1.05-.85 1.65-.17.6-.22 1.23-.15 1.85v4" /><path d="M9 18c-4.51 2-5-2-7-2" /></IconWrapper>;
        const MessageCircle = (props) => <IconWrapper {...props}><path d="M7.9 20A9 9 0 1 0 4 16.1L2 22Z" /></IconWrapper>;
        const Star = (props) => <IconWrapper {...props}><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" /></IconWrapper>;
        const LeetCode = (props) => (
            <IconWrapper {...props}>
                <path d="M16.1 18.04l-2.8 2.7c-.5.5-1.2.7-1.9.7s-1.4-.2-1.9-.7l-4.5-4.5c-.5-.5-.7-1.2-.7-1.9s.2-1.4.7-1.9l4.5-4.5c.5-.5 1.3-.5 1.9 0l2.8 2.7c.5.5.6 1.3.1 1.9a3 3 0 0 1-2 1c-.8.1-1.6-.2-2-.8l-2.3-2.2c-.1-.1-.4-.1-.5 0l-1.4 1.4c-.1.1-.1.4 0 .5l3.8 3.7c.1.1.4.1.5 0l1.3-1.3c.4-.4 1-.7 1.5-.7.5 0 1 .2 1.4.6l2.7 2.6c.5.5.5 1.5-.1 2z" />
                <path d="M19.3 7.23l-3.4-3.3c-.5-.5-1.3-.7-1.9-.3-.3.2-.5.6-.5 1.1 0 .4.2.9.5 1.1l3.4 3.3c.5.5 1.3.7 1.9.3.3-.2.5-.6.5-1.1 0-.4-.2-.9-.5-1.1z" />
            </IconWrapper>
        );

        // --- Stats Count Component ---
        const StatItem = ({ label, value, suffix = "" }) => {
            // Extract numeric part if value is a string like "15+"
            const numericValue = parseInt(value);
            const isNumeric = !isNaN(numericValue);
            const { count, countRef } = useCounter(isNumeric ? numericValue : 0);

            return (
                <div ref={countRef} className="space-y-2">
                    <div className="text-5xl md:text-6xl font-bold tracking-tighter">
                        {isNumeric ? count : 0}
                        {suffix || (value.toString().replace(/[0-9]/g, ''))}
                    </div>
                    <div className="text-sm md:text-base text-gray-400 font-medium uppercase tracking-wide">{label}</div>
                </div>
            );
        };

        // --- Main Component ---
        const Portfolio = () => {
            const [isMenuOpen, setIsMenuOpen] = useState(false);
            const [scrolled, setScrolled] = useState(false);

            useEffect(() => {
                const handleScroll = () => {
                    setScrolled(window.scrollY > 50);
                };
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            const scrollToSection = (id) => {
                setIsMenuOpen(false);
                const element = document.getElementById(id);
                if (element) {
                    element.scrollIntoView({ behavior: 'smooth' });
                }
            };

            const navLinks = [
                { name: 'About', id: 'about' },
                { name: 'Skills', id: 'skills' },
                { name: 'Work', id: 'projects' },
                { name: 'Contact', id: 'contact' },
            ];

            const projects = [
                {
                    title: "Minimalist E-Commerce",
                    category: "Web Development",
                    description: "A clean, monochrome shopping experience focused on product photography and seamless checkout flow.",
                    tech: ["React", "Tailwind", "Stripe"]
                },
                {
                    title: "Social Dashboard UI",
                    category: "Web Design",
                    description: "High-fidelity Figma prototype for a social media management tool with comprehensive analytics visualization.",
                    tech: ["Figma", "Prototyping", "UI/UX"]
                },
                {
                    title: "Content Creator Kit",
                    category: "Editing & Branding",
                    description: "A complete brand identity package including video intros, lower thirds, and social media templates.",
                    tech: ["Premiere Pro", "After Effects", "Photoshop"]
                },
                {
                    title: "Task Master App",
                    category: "Web Application",
                    description: "Productivity application with drag-and-drop functionality and local storage persistence.",
                    tech: ["JavaScript", "HTML5", "CSS3"]
                }
            ];

            const stats = [
                { label: "Projects Completed", value: "15", suffix: "+" },
                { label: "Internships", value: "07", suffix: "" },
                { label: "Years Experience", value: "02", suffix: "+" },
                { label: "Satisfied Clients", value: "100", suffix: "%" },
            ];

            const skills = [
                { category: "Development", items: ["HTML5", "CSS3", "JavaScript", "React", "Wix", "Git"] },
                { category: "Design", items: ["Figma", "UI/UX", "Wireframing", "Prototyping"] },
                { category: "Creative", items: ["Video Editing", "Content Creation", "Social Media Management"] },
            ];

            return (
                <div className="font-['Poppins'] bg-white text-black min-h-screen">
                    {/* Navbar */}
                    <nav
                        className={`fixed w-full z-50 transition-all duration-300 ${scrolled ? 'bg-white/80 backdrop-blur-md border-b border-gray-100 py-4' : 'bg-transparent py-6'
                            }`}
                    >
                        <div className="max-w-7xl mx-auto px-6 md:px-12 flex justify-between items-center">
                            <a href="#" onClick={() => window.scrollTo({ top: 0, behavior: 'smooth' })} className="text-xl font-bold tracking-tighter cursor-pointer">
                                DINESH.
                            </a>

                            {/* Desktop Nav */}
                            <div className="hidden md:flex space-x-8">
                                {navLinks.map((link) => (
                                    <button
                                        key={link.name}
                                        onClick={() => scrollToSection(link.id)}
                                        className="text-sm font-medium text-gray-500 hover:text-black transition-colors"
                                    >
                                        {link.name}
                                    </button>
                                ))}
                            </div>

                            {/* Mobile Menu Button */}
                            <button className="md:hidden" onClick={() => setIsMenuOpen(!isMenuOpen)}>
                                {isMenuOpen ? <XIcon size={24} /> : <MenuIcon size={24} />}
                            </button>
                        </div>

                        {/* Mobile Nav Overlay */}
                        {isMenuOpen && (
                            <div className="absolute top-full left-0 w-full bg-white border-b border-gray-100 py-4 px-6 md:hidden shadow-xl flex flex-col space-y-4">
                                {navLinks.map((link) => (
                                    <button
                                        key={link.name}
                                        onClick={() => scrollToSection(link.id)}
                                        className="text-left text-lg font-medium py-2"
                                    >
                                        {link.name}
                                    </button>
                                ))}
                            </div>
                        )}
                    </nav>

                    {/* Hero Section */}
                    <section className="min-h-screen flex flex-col justify-center pt-32 pb-12 px-6 md:px-12 relative overflow-hidden">
                        <div className="max-w-7xl mx-auto w-full grid lg:grid-cols-2 gap-12 lg:gap-20 items-center flex-grow">

                            {/* Text Content */}
                            <div className="order-2 lg:order-1 space-y-8 animate-fade-in-up relative z-10 flex flex-col justify-center">
                                {/* Badge */}
                                <div className="inline-flex items-center gap-2 px-4 py-2 bg-white border border-black/10 rounded-full w-fit shadow-sm">
                                    <span className="relative flex h-2.5 w-2.5">
                                        <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                                        <span className="relative inline-flex rounded-full h-2.5 w-2.5 bg-green-500"></span>
                                    </span>
                                    <span className="text-xs font-semibold tracking-wide text-black uppercase">Available for work</span>
                                </div>

                                {/* Headline */}
                                <h1 className="text-5xl md:text-7xl lg:text-8xl font-bold tracking-tighter leading-tight text-black">
                                    <span className="block">Hi, I'm</span>
                                    <span className="block">Dinesh</span>
                                    <span className="block">Kumar</span>
                                </h1>

                                <p className="text-lg md:text-xl text-gray-500 max-w-lg leading-relaxed font-light">
                                    Designing interfaces and coding experiences that leave a mark. Minimalist by design, functional by default.
                                </p>

                                <div className="flex flex-wrap gap-4 pt-6">
                                    <button
                                        onClick={() => scrollToSection('contact')}
                                        className="bg-black text-white px-10 py-5 rounded-full text-lg font-medium hover:bg-gray-800 transition-all flex items-center gap-3 shadow-xl hover:-translate-y-1"
                                    >
                                        Let's Talk <ArrowRight size={20} />
                                    </button>
                                    <button className="bg-transparent border-2 border-gray-200 text-black px-10 py-5 rounded-full text-lg font-medium hover:border-black transition-all flex items-center gap-3 hover:-translate-y-1">
                                        Download CV <Download size={20} />
                                    </button>
                                </div>
                            </div>

                            {/* Hero Image */}
                            <div className="order-1 lg:order-2 flex justify-center lg:justify-end relative">
                                <div className="relative w-full max-w-md aspect-[4/5] bg-gray-100 rounded-[3rem] overflow-hidden shadow-2xl transition-transform hover:scale-[1.01] duration-500 border border-gray-100 group">
                                    <img
                                        src="hero-image.png"
                                        onError={(e) => {
                                            // Fallback if local image not found (for preview only)
                                            e.target.onerror = null;
                                            e.target.src = "https://images.unsplash.com/photo-1600486913747-55e5470d6f40?q=80&w=1974&auto=format&fit=crop"
                                        }}
                                        alt="Dinesh Kumar"
                                        className="w-full h-full object-cover grayscale group-hover:grayscale-0 transition-all duration-700"
                                    />

                                    {/* Overlay Gradient */}
                                    <div className="absolute inset-0 bg-gradient-to-t from-black/20 via-transparent to-transparent pointer-events-none"></div>
                                </div>

                                {/* Floating Badge Effect - Styled like reference */}
                                <div className="absolute top-10 -left-6 md:-left-12 bg-white/90 backdrop-blur-md p-5 rounded-3xl shadow-2xl border border-white/50 hidden md:block animate-bounce" style={{ animationDuration: '5s' }}>
                                    <div className="flex items-center gap-4">
                                        <div className="bg-black text-white p-3 rounded-full">
                                            <CodeIcon size={24} fill="none" />
                                        </div>
                                        <div>
                                            <div className="text-xs text-gray-500 font-semibold uppercase tracking-wider mb-0.5">Skills</div>
                                            <div className="text-xl font-bold leading-none">Full Stack</div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* About Section */}
                    <section id="about" className="py-24 bg-gray-50 px-6 md:px-12">
                        <div className="max-w-4xl mx-auto text-center">
                            <span className="text-sm font-semibold tracking-widest text-gray-400 uppercase mb-4 block">About Me</span>
                            {/* Title Removed as requested */}
                            <p className="text-lg md:text-xl text-gray-600 leading-relaxed mb-8">
                                I am currently pursuing my Bachelor's in Computer Science at <span className="text-black font-semibold">Sri Krishna Adhithya College of Arts and Science</span>.
                                My passion lies in bridging the gap between functional code and aesthetic design.
                                With a toolkit that spans from Figma to React, I don't just build websites; I curate digital identities.
                            </p>
                        </div>
                    </section>

                    {/* Skills Section */}
                    <section id="skills" className="py-24 px-6 md:px-12">
                        <div className="max-w-7xl mx-auto">
                            <div className="mb-16">
                                <h2 className="text-4xl font-bold mb-4">Skills.</h2>
                                <div className="h-1 w-20 bg-black"></div>
                            </div>

                            <div className="grid md:grid-cols-3 gap-12">
                                {skills.map((skillGroup, index) => (
                                    <div key={index} className="space-y-6">
                                        <div className="flex items-center gap-3 mb-6">
                                            {index === 0 && <CodeIcon size={28} />}
                                            {index === 1 && <PenTool size={28} />}
                                            {index === 2 && <Video size={28} />}
                                            <h3 className="text-2xl font-semibold">{skillGroup.category}</h3>
                                        </div>
                                        <div className="flex flex-wrap gap-3">
                                            {skillGroup.items.map((skill) => (
                                                <span key={skill} className="px-4 py-2 bg-gray-50 border border-gray-100 rounded-lg text-sm font-medium hover:border-black transition-colors cursor-default">
                                                    {skill}
                                                </span>
                                            ))}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* Stats Section with Animation */}
                    <section className="py-24 bg-black text-white px-6 md:px-12">
                        <div className="max-w-7xl mx-auto">
                            <div className="grid grid-cols-2 md:grid-cols-4 gap-8 text-center">
                                {stats.map((stat, index) => (
                                    <StatItem key={index} label={stat.label} value={stat.value} suffix={stat.suffix} />
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* Projects Section */}
                    <section id="projects" className="py-24 px-6 md:px-12 bg-gray-50">
                        <div className="max-w-7xl mx-auto">
                            <div className="flex justify-between items-end mb-16">
                                <div>
                                    <h2 className="text-4xl font-bold mb-4">Selected Work.</h2>
                                    <div className="h-1 w-20 bg-black"></div>
                                </div>
                                <a href="#" className="hidden md:flex items-center gap-2 font-medium hover:underline">
                                    View all projects <ArrowRight size={16} />
                                </a>
                            </div>

                            <div className="grid md:grid-cols-2 gap-8">
                                {projects.map((project, index) => (
                                    <div key={index} className="group bg-white p-8 rounded-2xl shadow-sm hover:shadow-xl transition-all duration-300 transform hover:-translate-y-1">
                                        <div className="flex justify-between items-start mb-6">
                                            <span className="text-xs font-bold tracking-widest uppercase text-gray-400 border border-gray-200 px-3 py-1 rounded-full">
                                                {project.category}
                                            </span>
                                            <ExternalLink size={20} className="text-gray-300 group-hover:text-black transition-colors" />
                                        </div>
                                        <h3 className="text-2xl font-bold mb-3 group-hover:underline decoration-2 underline-offset-4">{project.title}</h3>
                                        <p className="text-gray-600 mb-6 leading-relaxed">
                                            {project.description}
                                        </p>
                                        <div className="flex flex-wrap gap-2 pt-4 border-t border-gray-100">
                                            {project.tech.map((t) => (
                                                <span key={t} className="text-xs font-medium text-gray-500">#{t}</span>
                                            ))}
                                        </div>
                                    </div>
                                ))}
                            </div>

                            <div className="mt-12 text-center md:hidden">
                                <a href="#" className="inline-flex items-center gap-2 font-medium hover:underline">
                                    View all projects <ArrowRight size={16} />
                                </a>
                            </div>
                        </div>
                    </section>

                    {/* Contact Section */}
                    <section id="contact" className="py-24 px-6 md:px-12">
                        <div className="max-w-4xl mx-auto text-center">
                            <span className="text-sm font-semibold tracking-widest text-gray-400 uppercase mb-4 block">Get in Touch</span>
                            <h2 className="text-4xl md:text-5xl font-bold mb-8">Let's create something extraordinary.</h2>
                            <p className="text-xl text-gray-500 mb-12 max-w-2xl mx-auto">
                                Whether you have a project in mind or just want to say hello, I'm always open to discussing new ideas and opportunities.
                            </p>

                            <div className="flex flex-col md:flex-row items-center justify-center gap-6 mb-16">
                                <a href="mailto:dineshkumarsk006@gmail.com" className="bg-black text-white px-8 py-4 rounded-full font-medium hover:bg-gray-800 transition-all flex items-center gap-3 w-full md:w-auto justify-center">
                                    <Mail size={20} />
                                    dineshkumarsk006@gmail.com
                                </a>
                                <a href="tel:+919944744562" className="bg-gray-100 text-black px-8 py-4 rounded-full font-medium hover:bg-gray-200 transition-all flex items-center gap-3 w-full md:w-auto justify-center">
                                    <Smartphone size={20} />
                                    +91 99447 44562
                                </a>
                            </div>

                            <div className="flex justify-center items-center gap-4 flex-wrap">
                                {/* LinkedIn */}
                                <a href="https://www.linkedin.com/in/dinesh-kumar-s-90251b314?utm_source=share&utm_campaign=share_via&utm_content=profile&utm_medium=ios_app" target="_blank" rel="noopener noreferrer" className="p-4 bg-gray-50 rounded-full hover:bg-[#0077b5] hover:text-white transition-all duration-300 group">
                                    <Linkedin size={24} />

                                    <MessageCircle size={24} />

                                    <Github size={24} />
                                </a>

                                {/* LeetCode */}
                                <a href="https://leetcode.com/u/Dineshkumar2125/" target="_blank" rel="noopener noreferrer" className="p-4 bg-gray-50 rounded-full hover:bg-[#FFA116] hover:text-white transition-all duration-300 group">
                                    <LeetCode size={24} />
                                </a>
                            </div>
                        </div>
                    </section>

                    {/* Footer */}
                    <footer className="py-8 border-t border-gray-100 px-6 md:px-12">
